version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: mib-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mib}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mib_dev}
      POSTGRES_DB: ${POSTGRES_DB:-mib}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mib} -d ${POSTGRES_DB:-mib}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mib-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mib}:${POSTGRES_PASSWORD:-mib_dev}@db:5432/${POSTGRES_DB:-mib}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
